# Builds the native app binaries in the cloud — this repo is developed on
# Windows, where Android needs a JDK/SDK install and iOS cannot build at all.
#
#   android → installable debug APK + unsigned release AAB (sign for Play
#             with the upload key — see native/README.md)
#   ios     → compile check + unsigned App.app (store upload needs an Apple
#             Developer account and signing — see native/README.md)
name: Native builds

on:
  push:
    branches: [main]
    paths:
      - 'native/**'
      - 'index.html'
      - 'app.js'
      - 'engine.js'
      - 'style.css'
      - 'manifest.json'
      - 'icon-*.png'
      - '.github/workflows/native-builds.yml'
  workflow_dispatch:

concurrency:
  group: native-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: native/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: node build-www.mjs
      - run: npx cap sync android
      - name: Build debug APK and release AAB
        working-directory: native/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: underwriter-android-debug-apk
          path: native/android/app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: underwriter-android-release-aab-unsigned
          path: native/android/app/build/outputs/bundle/release/app-release.aab

  # Signs and uploads to TestFlight (fastlane lane in native/ios/fastlane).
  # No-ops with a notice until the four signing secrets exist:
  # ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8, APPLE_TEAM_ID (native/README.md)
  testflight:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Check signing secrets
        id: gate
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_KEY_P8" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TestFlight upload skipped — add ASC_KEY_ID / ASC_ISSUER_ID / ASC_KEY_P8 / APPLE_TEAM_ID repo secrets to enable (native/README.md)"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: native/package-lock.json
      - if: steps.gate.outputs.ready == 'true'
        working-directory: native
        run: npm ci
      - if: steps.gate.outputs.ready == 'true'
        working-directory: native
        run: node build-www.mjs
      - if: steps.gate.outputs.ready == 'true'
        working-directory: native
        run: npx cap sync ios
      - name: Build, sign, upload to TestFlight
        if: steps.gate.outputs.ready == 'true'
        working-directory: native/ios
        run: fastlane beta

  ios:
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: native/package-lock.json
      - run: npm ci
      - run: node build-www.mjs
      # sync regenerates CapApp-SPM/Package.swift with macOS path separators
      # (the committed copy comes from a Windows machine)
      - run: npx cap sync ios
      - name: Build (unsigned)
        working-directory: native/ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App -configuration Release \
            -destination generic/platform=iOS -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO build
      - name: Package unsigned .app
        working-directory: native/ios/App
        run: ditto -c -k --keepParent build/Build/Products/Release-iphoneos/App.app App-unsigned.zip
      - uses: actions/upload-artifact@v4
        with:
          name: underwriter-ios-app-unsigned
          path: native/ios/App/App-unsigned.zip
